<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeno — Support</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0d0f14;
    color: #e8e6f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 1rem 1.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #00b894, #00d68f);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: white;
  }

  .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #00d68f; margin-left: auto;
    box-shadow: 0 0 6px #00d68f88;
  }

  .status-label { font-size: 12px; color: #00d68f; }

  .admin-link {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    border: 0.5px solid rgba(255,255,255,0.12);
    padding: 4px 10px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .admin-link:hover { color: #00d68f; border-color: rgba(0,214,143,0.4); }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message { display: flex; gap: 10px; max-width: 75%; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
  }
  .message.user .avatar { background: rgba(0,184,148,0.2); color: #55efc4; border: 0.5px solid rgba(0,184,148,0.35); }
  .message.assistant .avatar { background: rgba(255,255,255,0.06); color: #b2bec3; border: 0.5px solid rgba(255,255,255,0.1); }

  .bubble {
    padding: 0.65rem 0.9rem; border-radius: 14px; font-size: 14px;
    line-height: 1.6; max-width: 100%; word-break: break-word;
  }
  .message.user .bubble {
    background: rgba(0,184,148,0.15); border: 0.5px solid rgba(0,184,148,0.3);
    border-bottom-right-radius: 4px; color: #e8e6f0;
  }
  .message.assistant .bubble {
    background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 4px; color: #d4d2e0;
  }

  .thinking { display: flex; gap: 4px; align-items: center; padding: 0.65rem 0.9rem; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }

  .input-area {
    padding: 1rem 1.5rem; border-top: 0.5px solid rgba(255,255,255,0.06);
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: #0d0f14;
  }

  #query-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 0.65rem 1rem; color: #e8e6f0; font-size: 14px;
    font-family: inherit; resize: none; outline: none; max-height: 120px; min-height: 42px;
    line-height: 1.5; transition: border-color 0.15s;
  }
  #query-input::placeholder { color: rgba(255,255,255,0.25); }
  #query-input:focus { border-color: rgba(0,184,148,0.5); }

  #send-btn {
    width: 40px; height: 40px; border-radius: 10px; background: #00b894;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: #00d68f; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: rgba(0,184,148,0.3); cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: white; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,0.2); font-size: 13px;
  }
  .empty-logo {
    width: 48px; height: 48px; border-radius: 14px; background: rgba(0,184,148,0.12);
    border: 0.5px solid rgba(0,184,148,0.2); display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: #55efc4; margin-bottom: 4px;
  }

  .error-bubble {
    background: rgba(231,76,60,0.1); border: 0.5px solid rgba(231,76,60,0.25);
    color: #ff7675; padding: 0.65rem 0.9rem; border-radius: 10px; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Z</div>
  <span class="header-title">Zeno Support</span>
  <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
    <div class="status-dot"></div>
    <span class="status-label">online</span>
    <a href="/admin" class="admin-link">Admin →</a>
  </div>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <div class="empty-logo">Z</div>
    <span>Ask me anything about our store</span>
  </div>
</div>

<div class="input-area">
  <textarea id="query-input" placeholder="Type your question..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const sessionId = 'session_' + Math.random().toString(36).slice(2, 9);
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('query-input');
  const sendBtn = document.getElementById('send-btn');
  let isLoading = false;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function removeEmptyState() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
  }

  function appendMessage(role, text) {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'Z';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function appendThinking() {
    removeEmptyState();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'thinking';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'Z';
    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendMessage() {
    const query = input.value.trim();
    if (!query || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', query);
    appendThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, session_id: sessionId })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      removeThinking();
      appendMessage('assistant', data.answer);
    } catch (err) {
      removeThinking();
      removeEmptyState();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = 'Could not reach Zeno. Please try again.';
      chatWindow.appendChild(errDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
